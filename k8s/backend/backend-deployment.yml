apiVersion: apps/v1 
kind: Deployment 
metadata:
  name: backend-deployment 
  namespace: mern 

spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:

    metadata:
      labels: 
        app: backend 

    spec:
      containers:
      - name: backend 
        image: saiganesh74/mern-backend:30
        ports:
        - containerPort: 5000

        envFrom:
        - configMapRef:
            name: backend-config 
        - secretRef:
            name: db-secret